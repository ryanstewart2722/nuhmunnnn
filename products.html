<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman Nanda</title>
<style>
:root { --edge: 20px; }
@font-face {
  font-family: 'ABCDiatype';
  src: url('./fonts/ABCDiatype-Regular.otf') format('opentype');
  font-weight: normal; font-style: normal;
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  border: 0 none; outline: 0 none;
  -webkit-tap-highlight-color: transparent;
}

/*
  No position:fixed anywhere — fixed elements force GPU compositing layers
  which produce tile-seam artifacts on Retina displays in Safari.
  Everything is position:absolute within a body that fills the viewport.
*/
html {
  width: 100%; height: 100%;
  background: #D9D9D9;
  overflow: hidden;
}
body {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #D9D9D9;
  overflow: hidden;
  cursor: none;
  transition: background-color 0.8s ease;
  font-family: 'ABCDiatype', Arial, sans-serif;
}

/* Party mode */
@keyframes hue-cycle { 0% { color: hsl(0,42%,67%); } 44% { color: hsl(158,42%,67%); } 55% { color: hsl(222,42%,67%); } 100% { color: hsl(360,42%,67%); } }
body.party #clip, body.party #canvas, body.party #catalogue { background: transparent !important; }
#nav-center:hover { animation: hue-cycle 1.5s linear infinite; opacity: 1 !important; }
#party-toggle { background: none; border: none; padding: 0; cursor: pointer; color: #1a1a1a; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); line-height: 0; }
#party-toggle:hover { animation: hue-cycle 1.5s linear infinite; }
body.party #party-toggle { animation: hue-cycle 1.5s linear infinite; }

/* Frame — all 4 strips always fixed */
#bl { position: fixed; top: 0; left: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#br { position: fixed; top: 0; right: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#nav {
  position: fixed; top: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 15px; background: #D9D9D9; z-index: 200; cursor: auto;
}
#nav a { font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a; text-decoration: none; }
#nav a:hover { opacity: 0.5; }
#nav-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a;
}
#footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: #D9D9D9; z-index: 200; cursor: auto;
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a;
}

/* Scroll area — absolute, clips the canvas */
#clip {
  position: absolute;
  top: 28px; bottom: 28px; left: 15px; right: 15px;
  overflow: hidden;
  background: #ffffff;
}

/* Canvas — absolute within clip, moved by left/top */
#canvas {
  position: absolute;
  background: #ffffff;
  transition: left 0.55s cubic-bezier(0.77,0,0.175,1),
              top  0.55s cubic-bezier(0.77,0,0.175,1),
              transform 0.55s cubic-bezier(0.77,0,0.175,1);
}
#canvas.instant { transition: none; }

.card {
  position: absolute;
  background: transparent;
}

/* Link overlay */
.card-link {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10; display: none; cursor: none;
}
.card-link.active { display: block; cursor: pointer; }

.card-img {
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  background-size: calc(100% + 4px) calc(100% + 4px);
  background-repeat: no-repeat;
  background-position: center;
  background-color: transparent;
}

/* 1px black rule — positioned absolutely below image */
.card-rule {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: #000;
}

/* Meta text */
.card-meta {
  position: absolute;
  left: 0; right: 0;
  display: flex; align-items: baseline;
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px; color: #1a1a1a;
  line-height: 1; white-space: nowrap;
  padding-top: 5px;
  background: transparent;
}
.card-meta .m-name   { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; }
.card-meta .m-year   { flex: 0 0 auto; margin-right: 14px; }
.card-meta .m-client { flex: 0 0 auto; }

/* Cursors */
body.no-cursor,    body.no-cursor *    { cursor: none !important; }
body.link-cursor,  body.link-cursor *  { cursor: pointer !important; }
#cursor-wrap {
  position: absolute; pointer-events: none; z-index: 999;
  transform: translate(-50%,-50%); display: none;
  width: 28px; height: 28px;
  mix-blend-mode: exclusion; color: #fff;
}
#cursor-wrap svg { width: 28px; height: 28px; display: block; }

/* ── Gallery | Catalogue tab toggle ── */
#view-mode-tabs {
  position: absolute; top: 20px; left: 20px;
  z-index: 300; display: inline-flex; align-items: stretch;
  border: 1px solid rgb(209,209,209);
  background: rgba(236,236,236,0.60);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  user-select: none; -webkit-user-select: none; cursor: auto;
}
.vm-tab {
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a;
  padding: 4px 9px; cursor: pointer; white-space: nowrap;
}
.vm-tab.active { background: rgba(255,255,255,0.72); cursor: default; }
.vm-tab:not(.active) { color: rgba(26,26,26,0.40); }
.vm-tab:not(.active):hover { color: rgba(26,26,26,0.70); }
.vm-tab + .vm-tab { border-left: 1px solid rgb(209,209,209); }

/* ── Zoom shortcut label (Gallery mode only) ── */
#zoom-shortcut {
  position: absolute; top: 52px; left: 20px;
  z-index: 300;
  display: inline-flex; align-items: center; gap: 10px;
  border: 1px solid rgb(209,209,209);
  background: rgba(236,236,236,0.60);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  padding: 4px 9px;
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px;
  color: rgba(0,0,0,0.45);
  user-select: none; -webkit-user-select: none; cursor: default;
  white-space: nowrap;
}
.zoom-key {
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  width: 25px; height: 13px; flex-shrink: 0;
  background: rgba(236,236,236,0.60);
  border: 1px solid rgb(209,209,209);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}

/* ── Catalogue view ── */
#catalogue {
  position: absolute; inset: 0;
  overflow-y: scroll; overflow-x: hidden;
  scrollbar-width: none; -ms-overflow-style: none;
  display: none; z-index: 100;
  background: #fff;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 60px, black calc(100% - 60px), transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0px, black 60px, black calc(100% - 60px), transparent 100%);
}
#catalogue::-webkit-scrollbar { display: none; }
#cat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 20px;
  padding: 60px 20px 40px;
  min-height: 100%;
}
.cat-card {
  display: block; text-decoration: none; color: inherit;
  cursor: none;
  transition: opacity 0.3s ease;
}
.cat-img {
  width: 100%;
  aspect-ratio: 1043 / 1399;
  overflow: hidden;
  background-size: calc(100% + 4px) calc(100% + 4px);
  background-position: center;
  background-repeat: no-repeat;
  background-color: transparent;
  border: none;
  filter: blur(40px); opacity: 0;
  transition: filter 1.4s cubic-bezier(0.25,0,0.1,1), opacity 1.2s ease;
}
.cat-img.loaded { filter: blur(0); opacity: 1; }
.cat-rule { width: 100%; height: 1px; background: #000; display: block; margin-top: 4px; }
.cat-meta {
  display: flex; align-items: baseline;
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px; color: #1a1a1a;
  line-height: 1; white-space: nowrap;
  padding: 4px 0 0;
}
.cat-meta .m-name   { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; }
.cat-meta .m-year   { flex: 0 0 auto; margin-right: 14px; }
.cat-meta .m-client { flex: 0 0 auto; }

/* ── "View" cursor for catalogue ── */
#cat-cursor {
  position: absolute; pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%); display: none;
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px;
  color: #fff; mix-blend-mode: exclusion;
  white-space: nowrap;
  user-select: none; -webkit-user-select: none;
}

/* ── Minimap ── */
#minimap {
  position: absolute;
  bottom: 48px;
  left: 35px;
  z-index: 300;
  cursor: auto;
  width: 290px;
  padding: 16px;
  background: rgba(0,0,0,0.05);
  backdrop-filter: blur(10px) saturate(140%);
  -webkit-backdrop-filter: blur(10px) saturate(140%);
  border: 0.5px solid rgba(0,0,0,0.1);
}
.mm-rule {
  height: 1px;
  background: #000;
  margin-bottom: 1px;
}
.mm-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mm-title {
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px;
  color: #000;
  line-height: normal;
  white-space: nowrap;
}
.mm-close {
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px;
  color: #000;
  cursor: pointer;
  display: inline-block;
  transform: rotate(45deg);
  line-height: 1;
  transition: opacity 0.15s ease;
}
.mm-close:hover { opacity: 0.45; }
#mm-window {
  margin-top: 9px;
  height: 126px;
  overflow: hidden;
  position: relative;
  cursor: grab;
  perspective: 380px;
  user-select: none;
  -webkit-user-select: none;
}
#mm-window.dragging { cursor: grabbing; }
#mm-inner {
  position: absolute;
  top: 0; left: 0;
  width: 320px;
  height: 200px;
  will-change: transform;
}
.mm-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 1.5px;
  background: rgba(0,0,0,0.14);
  cursor: pointer;
  transition: background 0.12s ease;
}
.mm-dot:hover  { background: rgba(0,0,0,0.28); }
.mm-dot.active { background: rgba(0,0,0,0.58); }

/* ── View toggle (bottom-left of footer) ── */
#view-toggle {
  position: absolute;
  left: 20px; top: 50%; transform: translateY(-50%);
  display: flex; gap: 10px; align-items: center;
}
.vt-label {
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px; color: rgba(0,0,0,0.25);
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: color 0.15s ease;
}
.vt-label.active { color: #000; }
.vt-label:hover  { opacity: 0.7; }

/* ── Project view overlay ── */
#pv-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.30);
  backdrop-filter: blur(28px) saturate(150%);
  -webkit-backdrop-filter: blur(28px) saturate(150%);
  display: none;
  align-items: center; justify-content: center;
  z-index: 400; overflow: hidden;
  cursor: auto;
}
#pv-overlay.visible { display: flex; }
#pv-strip {
  display: flex; align-items: center;
  flex-wrap: nowrap;
}
.pv-item {
  flex-shrink: 0;
  display: block;
  position: relative;
  overflow: visible;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  background-color: transparent;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.2s ease;
}
#pv-strip:hover .pv-item         { opacity: 0.5; }
#pv-strip:hover .pv-item:hover   { opacity: 1; }
.pv-label {
  position: absolute;
  top: calc(100% + 8px);
  left: 0; right: 0;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}
.pv-item:hover .pv-label { opacity: 1; }
.pv-l-rule {
  width: 100%;
  height: 1px;
  background: #000;
  margin-bottom: 5px;
}
.pv-l-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px;
  color: #000;
  white-space: nowrap;
  line-height: 1;
}

/* ── Mobile: simple single-column scroll ── */
#mobile-layout { display: none; }

@media (max-width: 768px) {
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    cursor: auto;
  }

  body {
    position: relative;
    top: auto; left: auto; right: auto; bottom: auto;
    background: #D9D9D9;
    padding: 28px 0;
  }

  #nav    { position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  #footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
  /* #bl and #br stay visible on all screen sizes */

  #nav a, #nav-center { cursor: auto; }
  #clip, #cursor-wrap, #cursor-dot, #minimap { display: none !important; }

  #mobile-layout {
    display: block;
    background: #ffffff;
    height: calc(100vh - 56px);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    margin: 0 15px;
    padding: 0 10px;
  }
  #mobile-layout::-webkit-scrollbar { display: none; }

  .m-card { width: 100%; display: block; background: transparent; text-decoration: none; color: inherit; }

  .m-card-img {
    width: 100%;
    aspect-ratio: 1043 / 1399;
    overflow: hidden;
    background-color: #ffffff;
    background-size: calc(100% + 4px) calc(100% + 4px);
    background-position: center;
    background-repeat: no-repeat;
    display: block;
  }

  .m-card-rule { width: 100%; height: 1px; background: #000; display: block; }

  .m-card-meta {
    display: flex; align-items: baseline;
    font-family: 'ABCDiatype', Arial, sans-serif;
    font-size: 12px; color: #1a1a1a;
    line-height: 1; white-space: nowrap;
    padding: 5px 0 32px;
  }
  .m-card-meta .m-name   { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; }
  .m-card-meta .m-year   { flex: 0 0 auto; margin-right: 14px; }
  .m-card-meta .m-client { flex: 0 0 auto; }
}

</style>

// 8 directions: rotation for the SVG arrow (which points LEFT at 0°)
const DIRS = {
  'left':       { rot: 0,   dr: 0,  dc: -1 },
  'up-left':    { rot: 45,  dr: -1, dc: -1 },
  'up':         { rot: 90,  dr: -1, dc: 0  },
  'up-right':   { rot: 135, dr: -1, dc: 1  },
  'right':      { rot: 180, dr: 0,  dc: 1  },
  'down-right': { rot: 225, dr: 1,  dc: 1  },
  'down':       { rot: 270, dr: 1,  dc: 0  },
  'down-left':  { rot: 315, dr: 1,  dc: -1 },
};

const clip       = document.getElementById('clip');
const canvas     = document.getElementById('canvas');
const cursorWrap = document.getElementById('cursor-wrap');
const cursorDot  = document.getElementById('cursor-dot');
const cursorSvg  = document.getElementById('cursor-svg');
const catCursor  = document.getElementById('cat-cursor');

let VW, VH, cardW, imgH, cardH;
let focusCol = 1, focusRow = 2, hoverDir = null;
let zoomLevel = 1.0;
let catMode = false;

function measure() {
  VW = clip.clientWidth;
  VH = clip.clientHeight;
  cardW = Math.floor((VW - 60*2 - GAP*4) / 3);
  imgH  = Math.round(cardW * IMG_RATIO);
  cardH = imgH + 1 + META_H;
}

function buildGrid() {
  canvas.innerHTML = '';
  canvas.style.width  = (COLS*cardW + (COLS-1)*GAP) + 'px';
  canvas.style.height = (ROWS*cardH + (ROWS-1)*GAP) + 'px';

  for (let i = 0; i < COLS*ROWS; i++) {
    const p   = projects[i];
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const L   = col*(cardW+GAP);
    const T   = row*(cardH+GAP);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'left:'+L+'px;top:'+T+'px;width:'+cardW+'px;height:'+cardH+'px;';

    const link = document.createElement('a');
    link.className = 'card-link';
    if (p.name !== 'Confidential') {
      link.href = (p.client && p.client.includes('Pax')) ? 'pax-project.html' : 'flaus-project.html';
    }
    link.id = 'cl' + i;
    card.appendChild(link);

    const imgDiv = document.createElement('div');
    imgDiv.className = 'card-img';
    imgDiv.style.cssText = 'width:'+cardW+'px;height:'+imgH+'px;background-image:url('+JSON.stringify(p.img)+');';
    card.appendChild(imgDiv);

    const rule = document.createElement('div');
    rule.className = 'card-rule';
    rule.style.top = imgH + 'px';
    card.appendChild(rule);

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.style.top = (imgH+1) + 'px';
    meta.style.height = META_H + 'px';
    meta.innerHTML = '<span class="m-name">'+p.name+'</span><span class="m-year">'+p.year+'</span><span class="m-client">'+p.client+'</span>';
    card.appendChild(meta);

    canvas.appendChild(card);
  }
  updateLink();
}

function updateLink() {
  document.querySelectorAll('.card-link').forEach(l => l.classList.remove('active'));
  const l = document.getElementById('cl' + (focusRow*COLS + focusCol));
  if (l) l.classList.add('active');
}

function getPos() {
  const xC = focusCol*(cardW+GAP) + cardW/2;
  const tx  = Math.round(VW/2 - xC);
  const ty  = Math.round(VH/2 - (focusRow*(cardH+GAP) + imgH/2));
  return { tx, ty };
}

function applyPos(animated) {
  const { tx, ty } = getPos();
  canvas.classList.toggle('instant', !animated);
  if (!animated) canvas.offsetHeight; // flush
  canvas.style.left = tx + 'px';
  canvas.style.top  = ty + 'px';
  // Transform origin = focused card center in canvas space = viewport center in canvas space
  const xC = focusCol*(cardW+GAP) + cardW/2;
  const yC = focusRow*(cardH+GAP) + imgH/2;
  canvas.style.transformOrigin = xC + 'px ' + yC + 'px';
  canvas.style.transform = 'scale(' + zoomLevel + ')';
}

function setZoom(level) {
  zoomLevel = level;
  applyPos(true);
}

function navTo(dir) {
  if (!dir) return;
  const { dr, dc } = DIRS[dir];
  if (dr < 0 && focusRow > 0)      focusRow--;
  if (dr > 0 && focusRow < ROWS-1) focusRow++;
  if (dc < 0 && focusCol > 0)      focusCol--;
  if (dc > 0 && focusCol < COLS-1) focusCol++;
  applyPos(true); updateLink(); updateMinimap();
}

function navOpacity(dir) {
  const { dr, dc } = DIRS[dir];
  const rowOk = (dr === 0) || (dr < 0 ? focusRow > 0 : focusRow < ROWS-1);
  const colOk = (dc === 0) || (dc < 0 ? focusCol > 0 : focusCol < COLS-1);
  if (rowOk && colOk) return 1;
  if (dr !== 0 && dc !== 0 && (rowOk || colOk)) return 0.5;
  return 0;
}

function nearScreenEdge(mx, my, dir) {
  const r = clip.getBoundingClientRect();
  const { dr, dc } = DIRS[dir];
  const T = 0.12;
  if (dr < 0 && (my - r.top)    < r.height * T) return true;
  if (dr > 0 && (r.bottom - my) < r.height * T) return true;
  if (dc < 0 && (mx - r.left)   < r.width  * T) return true;
  if (dc > 0 && (r.right - mx)  < r.width  * T) return true;
  return false;
}

function getZone(mx, my) {
  const r  = clip.getBoundingClientRect();
  const dx = mx - (r.left + r.width  / 2);
  const dy = my - (r.top  + r.height / 2);
  if (Math.sqrt(dx*dx + dy*dy) < Math.min(r.width, r.height) * 0.04) return null;
  const a = Math.atan2(dy, dx) * 180 / Math.PI;
  if (a > -15  && a <= 15)   return 'right';
  if (a > 15   && a <= 50)   return 'down-right';
  if (a > 50   && a <= 130)  return 'down';
  if (a > 130  && a <= 165)  return 'down-left';
  if (a > 165  || a <= -165) return 'left';
  if (a > -165 && a <= -130) return 'up-left';
  if (a > -130 && a <= -50)  return 'up';
  return 'up-right';
}

// ── Catalogue view ────────────────────────────────────────────
let catObserver = null;

function buildCatalogue() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';

  if (catObserver) { catObserver.disconnect(); catObserver = null; }

  const catalogue = document.getElementById('catalogue');
  catObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('loaded');
        catObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, root: catalogue });

  projects.forEach(p => {
    const a = document.createElement('a');
    a.className = 'cat-card';
    const isConfidential = p.name === 'Confidential';
    if (!isConfidential) {
      a.href = (p.client && p.client.includes('Pax')) ? 'pax-project.html' : 'flaus-project.html';
    }
    if (isConfidential) a.dataset.confidential = '1';

    const imgDiv = document.createElement('div');
    imgDiv.className = 'cat-img';
    imgDiv.style.backgroundImage = 'url(' + JSON.stringify(p.img) + ')';

    const rule = document.createElement('div');
    rule.className = 'cat-rule';

    const meta = document.createElement('div');
    meta.className = 'cat-meta';
    meta.innerHTML =
      '<span class="m-name">'   + p.name   + '</span>' +
      '<span class="m-year">'   + p.year   + '</span>' +
      '<span class="m-client">' + p.client + '</span>';

    a.appendChild(imgDiv);
    a.appendChild(rule);
    a.appendChild(meta);
    // Hover fade: enter dims others, leave resets all (including gap areas)
    a.addEventListener('mouseenter', () => {
      grid.querySelectorAll('.cat-card').forEach(c => {
        c.style.opacity = c !== a ? '0.20' : '1';
      });
    });
    a.addEventListener('mouseleave', () => {
      grid.querySelectorAll('.cat-card').forEach(c => c.style.opacity = '1');
    });

    grid.appendChild(a);

    catObserver.observe(imgDiv);
  });
}

function setViewMode(mode) {
  catMode = (mode === 'catalogue');

  canvas.style.display          = catMode ? 'none' : '';
  document.getElementById('catalogue').style.display   = catMode ? 'block' : 'none';
  document.getElementById('minimap').style.display     = catMode ? 'none' : '';
  document.getElementById('vm-gallery').classList.toggle('active', !catMode);
  document.getElementById('vm-catalogue').classList.toggle('active',  catMode);

  if (catMode) {
    buildCatalogue();
    document.body.style.cursor = 'none';
    cursorWrap.style.display = 'none';
    cursorDot.style.display  = 'none';
  } else {
    catCursor.style.display  = 'none';
    document.body.style.cursor = 'none';
  }
}

function buildProjectView() {
  const strip = document.getElementById('pv-strip');
  if (!strip) return;

function layoutPv() {
  const strip = document.getElementById('pv-strip');
  if (!strip) return;
  const pvH   = Math.round(VH * 182 / 903);
  const pvW   = Math.round(pvH / IMG_RATIO);
  const pvGap = Math.round(VW * 19 / 1440);
  strip.style.gap = pvGap + 'px';
  strip.querySelectorAll('.pv-item').forEach(el => {
    el.style.width  = pvW + 'px';

function setPvMode(on) {
  pvMode = on;
  const overlay = document.getElementById('pv-overlay');
  if (overlay) overlay.classList.toggle('visible', on);
  document.getElementById('vt-product').classList.toggle('active', !on);
  document.getElementById('vt-project').classList.toggle('active',  on);
  document.body.style.cursor = on ? '' : 'none';
  cursorWrap.style.display = 'none';
  cursorDot.style.display  = 'none';
}

document.addEventListener('mousemove', e => {
  if (pvMode) return;

  if (catMode) {
    const r = clip.getBoundingClientRect();
    const ins = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
    const onCard = !!e.target.closest('.cat-card');
    const onUI   = !!(e.target.closest('#view-mode-tabs') || e.target.closest('#zoom-shortcut'));
    if (!ins || onUI) {
      catCursor.style.display  = 'none';
      document.body.style.cursor = ins ? 'auto' : 'none';
    } else if (!onCard) {
      catCursor.style.display  = 'none';
      document.body.style.cursor = 'default';
    } else {
      const card = e.target.closest('.cat-card');
      catCursor.textContent = card && card.dataset.confidential ? 'Confidential' : 'View';
      catCursor.style.left = e.clientX + 'px';
      catCursor.style.top  = e.clientY + 'px';
      catCursor.style.display = 'block';
      document.body.style.cursor = 'none';
    }
    cursorWrap.style.display = 'none';
    cursorDot.style.display  = 'none';
    return;
  }

  const r   = clip.getBoundingClientRect();
  const ins = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;

  // Outside clip or over UI chrome — restore normal OS cursor
  if (!ins || e.target.closest('#minimap') || e.target.closest('#view-mode-tabs') || e.target.closest('#zoom-shortcut')) {
    cursorWrap.style.display = 'none';
    document.body.classList.remove('no-cursor', 'link-cursor');
    hoverDir = null;
    return;
  }

  // Check if over the focused card (full bounds) for a linked product
  const focusedProject = projects[focusRow * COLS + focusCol];
  const isLink = focusedProject && focusedProject.name !== 'Confidential';
  if (isLink) {
    const cr = canvas.getBoundingClientRect();
    const cardL = cr.left + focusCol * (cardW + GAP);
    const cardT = cr.top  + focusRow * (cardH + GAP);
    if (e.clientX >= cardL && e.clientX <= cardL + cardW && e.clientY >= cardT && e.clientY <= cardT + cardH) {
      document.body.classList.remove('no-cursor');
      document.body.classList.add('link-cursor');
      cursorWrap.style.display = 'none';
      hoverDir = null;
      return;
    }
  }

  // Everywhere else: show directional arrow, hide OS cursor
  document.body.classList.remove('link-cursor');
  document.body.classList.add('no-cursor');

  const z = getZone(e.clientX, e.clientY);

  // Resolve direction — for null (dead center) pick the closest real zone
  let displayDir = z;
  if (z === null) {
    displayDir = 'up'; // fallback for tiny dead-center; rarely reached
  } else if (navOpacity(z) === 0.5) {
    const { dr, dc } = DIRS[z];
    const rowOk = dr < 0 ? focusRow > 0 : focusRow < ROWS - 1;
    const colOk = dc < 0 ? focusCol > 0 : focusCol < COLS - 1;
    if (rowOk && !colOk) displayDir = dr < 0 ? 'up'   : 'down';
    if (!rowOk && colOk) displayDir = dc < 0 ? 'left' : 'right';
  }

  const op = z === null ? 1 : navOpacity(z);
  hoverDir = displayDir;
  cursorWrap.style.left    = e.clientX + 'px';
  cursorWrap.style.top     = e.clientY + 'px';
  cursorSvg.style.transform = 'rotate(' + DIRS[displayDir].rot + 'deg)';
  cursorWrap.style.opacity = op === 0 ? '0.20' : '1';
  cursorWrap.style.display = 'block';
});

clip.addEventListener('click', e => {
  if (pvMode) return;
  if (catMode) return;
  if (e.target.closest && e.target.closest('#minimap')) return;
  if (e.target.closest && e.target.closest('#view-mode-tabs')) return;
  if (hoverDir === null) { const l = document.getElementById('cl' + (focusRow*COLS + focusCol)); if (l && l.href) window.location.href = l.href; }
  else navTo(hoverDir);
});

document.addEventListener('mouseleave', () => {
  cursorWrap.style.display = 'none';
  catCursor.style.display  = 'none';
  document.body.classList.remove('no-cursor', 'link-cursor');
});

document.addEventListener('keydown', e => {
  if (e.key === '[') { e.preventDefault(); setViewMode('catalogue'); return; }
  if (e.key === ']') { e.preventDefault(); setViewMode('gallery');   return; }
  if (catMode) return;
  const m = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (m[e.key]) { navTo(m[e.key]); updateMinimap(); }
  if (e.key === 'Enter') { const l = document.getElementById('cl' + (focusRow*COLS + focusCol)); if (l && l.href) window.location.href = l.href; }
});

// ── Trackpad swipe navigation ─────────────────────────────
let swipeLocked = false;
let swipeAccX = 0, swipeAccY = 0;
const SWIPE_THRESHOLD = 80;

clip.addEventListener('wheel', e => {
  if (catMode) return; // let native scroll reach #catalogue
  e.preventDefault();
  if (pvMode) return;

  swipeAccX += e.deltaX;
  swipeAccY += e.deltaY;

  if (swipeLocked) return;

  const ax = Math.abs(swipeAccX), ay = Math.abs(swipeAccY);
  if (ax < SWIPE_THRESHOLD && ay < SWIPE_THRESHOLD) return;

  let dir;
  if (ax >= ay) {
    dir = swipeAccX > 0 ? 'right' : 'left';
  } else {
    dir = swipeAccY > 0 ? 'down' : 'up';
  }

  swipeAccX = 0; swipeAccY = 0;
  swipeLocked = true;
  navTo(dir);
  setTimeout(() => { swipeLocked = false; swipeAccX = 0; swipeAccY = 0; }, 900);
}, { passive: false });

// ════════════════════════════════════════════
//  MINIMAP
// ════════════════════════════════════════════
const MM_DOT   = 8;
const MM_COL_P = 78;
const MM_ROW_P = 48;
const MM_WIN_W = 258;
const MM_WIN_H = 126;
const MM_INN_W = COLS * MM_DOT + (COLS-1) * (MM_COL_P - MM_DOT);
const MM_INN_H = ROWS * MM_DOT + (ROWS-1) * (MM_ROW_P - MM_DOT);

let mmX = 0, mmY = 0;
let mmTiltX = 0, mmTiltY = 0;
let mmTX = 0, mmTY = 0;
let mmRAF = null, mmMoved = false;

function mmApply() {
  const inner = document.getElementById('mm-inner');
  if (inner) inner.style.transform =
    `translate(${mmX.toFixed(1)}px,${mmY.toFixed(1)}px) ` +
    `rotateX(${mmTiltX.toFixed(2)}deg) rotateY(${mmTiltY.toFixed(2)}deg)`;
}

function mmStep() {
  const LP = 0.068, LT = 0.13;
  mmX      += (mmTX - mmX)  * LP;
  mmY      += (mmTY - mmY)  * LP;
  mmTiltX  += (0 - mmTiltX) * LT;
  mmTiltY  += (0 - mmTiltY) * LT;
  mmApply();
  const settled = Math.abs(mmTX - mmX) < 0.06 && Math.abs(mmTY - mmY) < 0.06
               && Math.abs(mmTiltX) < 0.02    && Math.abs(mmTiltY) < 0.02;
  if (settled) {
    mmX = mmTX; mmY = mmTY; mmTiltX = 0; mmTiltY = 0;
    mmApply(); mmRAF = null;
  } else {
    mmRAF = requestAnimationFrame(mmStep);
  }
}

function mmGoto(tx, ty) {
  mmTX = tx; mmTY = ty;
  if (!mmRAF) mmRAF = requestAnimationFrame(mmStep);
}

function buildMinimap() {
  const win   = document.getElementById('mm-window');
  const inner = document.getElementById('mm-inner');
  if (!win || !inner) return;

  inner.innerHTML = '';
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const dot = document.createElement('div');
      dot.className   = 'mm-dot';
      dot.dataset.row = row;
      dot.dataset.col = col;
      dot.style.left  = col * MM_COL_P + 'px';
      dot.style.top   = row * MM_ROW_P + 'px';
      inner.appendChild(dot);
    }
  }

  inner.addEventListener('click', e => {
    if (mmMoved) return;
    const dot = e.target.closest('.mm-dot');
    if (!dot) return;
    e.stopPropagation();
    focusRow = +dot.dataset.row; focusCol = +dot.dataset.col;
    applyPos(true); updateLink(); updateMinimap();
  });

  win.addEventListener('mousedown', e => {
    if (e.target.closest('#mm-close')) return;
    if (mmRAF) { cancelAnimationFrame(mmRAF); mmRAF = null; }
    const sx0 = e.clientX, sy0 = e.clientY;
    const x0  = mmX,       y0  = mmY;
    let prevCX = e.clientX, prevCY = e.clientY;
    mmMoved = false;
    win.classList.add('dragging');

    const onMove = ev => {
      const dx = ev.clientX - sx0, dy = ev.clientY - sy0;
      if (Math.abs(dx) + Math.abs(dy) > 2) mmMoved = true;
      const vx = ev.clientX - prevCX, vy = ev.clientY - prevCY;
      prevCX = ev.clientX; prevCY = ev.clientY;
      mmX = mmTX = x0 + dx;
      mmY = mmTY = y0 + dy;
      const MT = 8;
      mmTiltY = Math.max(-MT, Math.min(MT, mmTiltY * 0.65 + vx * 0.35));
      mmTiltX = Math.max(-MT, Math.min(MT, mmTiltX * 0.65 + (-vy) * 0.35));
      mmApply();
    };

    const onUp = () => {
      win.classList.remove('dragging');
      setTimeout(() => { mmMoved = false; }, 0);
      if (!mmRAF && (Math.abs(mmTiltX) > 0.05 || Math.abs(mmTiltY) > 0.05))
        mmRAF = requestAnimationFrame(mmStep);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    e.preventDefault();
  });

  const closeBtn = document.getElementById('mm-close');
  if (closeBtn) {
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const hidden = win.style.display === 'none';
      win.style.display = hidden ? 'block' : 'none';
      closeBtn.style.transform = hidden ? 'rotate(45deg)' : 'rotate(0deg)';
    });
  }

  updateMinimap(false);
}

function updateMinimap(animate = true) {
  document.querySelectorAll('.mm-dot').forEach(d =>
    d.classList.toggle('active', +d.dataset.row === focusRow && +d.dataset.col === focusCol));
  const tx = -(focusCol * MM_COL_P + MM_DOT / 2 - MM_WIN_W / 2);
  const ty = -(focusRow * MM_ROW_P + MM_DOT / 2 - MM_WIN_H / 2);
  if (animate) {
    mmGoto(tx, ty);
  } else {
    mmX = mmTX = tx; mmY = mmTY = ty; mmApply();
  }
}

function buildMobileLayout() {
  const container = document.getElementById('mobile-layout');
  container.innerHTML = '';
  // Use unique products only for mobile (skip duplicates)
  const seen = new Set();
  projects.forEach(p => {
    if (seen.has(p.img)) return;
    seen.add(p.img);

    const link = document.createElement('a');
    link.className = 'm-card';
    link.href = (p.client && p.client.includes('Pax')) ? 'pax-project.html' : 'flaus-project.html';

    const imgDiv = document.createElement('div');
    imgDiv.className = 'm-card-img';
    imgDiv.style.backgroundImage = 'url(' + JSON.stringify(p.img) + ')';

    const rule = document.createElement('div');
    rule.className = 'm-card-rule';

    const meta = document.createElement('div');
    meta.className = 'm-card-meta';
    meta.innerHTML =
      '<span class="m-name">'   + p.name   + '</span>' +
      '<span class="m-year">'   + p.year   + '</span>' +
      '<span class="m-client">' + p.client + '</span>';

    link.appendChild(imgDiv);
    link.appendChild(rule);
    link.appendChild(meta);
    container.appendChild(link);
  });
}

let minimapBuilt = false;
function init() {
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  if (isMobile) { buildMobileLayout(); return; }
  measure(); buildGrid(); applyPos(false);
  if (!minimapBuilt) {
    buildMinimap();
    buildProjectView();
    minimapBuilt = true;
  } else {
    updateMinimap();
    layoutPv();
  }
}
window.addEventListener('resize', init);
init();

// ── View toggle listeners ──
document.getElementById('vt-product').addEventListener('click', () => setPvMode(false));
document.getElementById('vt-project').addEventListener('click', () => setPvMode(true));

// ── Gallery | Catalogue toggle ──
document.getElementById('vm-gallery').addEventListener('click', () => { if (catMode) setViewMode('gallery'); });
document.getElementById('vm-catalogue').addEventListener('click', () => { if (!catMode) setViewMode('catalogue'); });

// ── Zoom shortcut click ──
document.getElementById('zk-out').addEventListener('click', () => setViewMode('catalogue'));
document.getElementById('zk-in').addEventListener('click',  () => setViewMode('gallery'));

// ── Party mode ──
(function() {
  const KEY = 'naman-party';
  const BANNED = [[160, 220]];
  let lastH = -1, _interval = null;
  function nextPastel() {
    let h;
    do { h = Math.floor(Math.random() * 360); }
    while (Math.abs(h - lastH) < 40 || BANNED.some(([a,b]) => h >= a && h <= b));
    lastH = h;
    return `hsl(${h},${35 + Math.floor(Math.random() * 20)}%,${62 + Math.floor(Math.random() * 10)}%)`;
  }
  function setParty(on) {
    document.body.classList.toggle('party', on);
    localStorage.setItem(KEY, on ? '1' : '0');
    if (on) {
      document.body.style.backgroundColor = nextPastel();
      _interval = setInterval(() => { document.body.style.backgroundColor = nextPastel(); }, 2000);
    } else {
      clearInterval(_interval); _interval = null;
      document.body.style.backgroundColor = '';
    }
  }
  document.getElementById('party-toggle').addEventListener('click', () => setParty(!document.body.classList.contains('party')));
})();
</script>
