<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman Nanda</title>
<style>
@font-face {
  font-family: 'ABCDiatype';
  src: url('./fonts/ABCDiatype-Regular.otf') format('opentype');
  font-weight: normal; font-style: normal;
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  border: 0 none; outline: 0 none;
  -webkit-tap-highlight-color: transparent;
}
html {
  width: 100%; height: 100%;
  background: #D9D9D9;
  overflow: hidden;
}
body {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #D9D9D9;
  overflow: hidden;
  font-family: 'ABCDiatype', Arial, sans-serif;
}

/* ── Frame ── */
#bl { position: fixed; top: 0; left: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#br { position: fixed; top: 0; right: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#nav {
  position: fixed; top: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 15px; background: #D9D9D9; z-index: 200; cursor: auto;
}
#nav a, #nav span {
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 10px; color: #1a1a1a; text-decoration: none;
}
#nav a:hover { opacity: 0.5; }
#nav-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 10px; color: #1a1a1a;
  pointer-events: none;
}
#footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: #D9D9D9; z-index: 200; cursor: auto;
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 10px; color: #1a1a1a;
}

/* ── Clip area ── */
#clip {
  position: absolute;
  top: 28px; bottom: 28px; left: 15px; right: 15px;
  overflow: hidden;
  cursor: none;
}

/* ── Image layers — two for blur crossfade ── */
.img-layer {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  filter: blur(6px);
  transition: opacity 0.28s ease, filter 0.28s ease;
  will-change: opacity, filter;
}
.img-layer.visible {
  opacity: 1;
  filter: blur(0px);
}

/* ── Inner shadow (Figma: inset 0 0 10px 4px rgba(0,0,0,.15)) ── */
#inner-shadow {
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 10px 4px rgba(0,0,0,0.15);
  pointer-events: none;
  z-index: 3;
}

/* ── Custom cursor ── */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 190;
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 10px;
  line-height: 1;
  color: #ffffff;
  mix-blend-mode: exclusion;
  transform: translate(-50%, -50%);
  white-space: nowrap;
  display: none;
  user-select: none;
  -webkit-user-select: none;
}
</style>
</head>
<body>

<div id="bl"></div>
<div id="br"></div>

<nav id="nav">
  <a href="products.html">Work</a>
  <span id="nav-center">Naman Nanda</span>
  <a href="about.html">About</a>
</nav>

<footer id="footer">© 2026 All Rights Reserved</footer>

<div id="clip">
  <div class="img-layer" id="layer-a"></div>
  <div class="img-layer" id="layer-b"></div>
  <div id="inner-shadow"></div>
</div>

<div id="cursor"></div>

<script>
const SECTIONS = [
  { file: 'Home_1_Saintly Tushy.png',          label: 'Saintly Tushy' },
  { file: 'Home_2_Canopy Diffuser.png',         label: 'Canopy Diffuser' },
  { file: 'Home_3_Flaus Electric Flosser.png',  label: 'Flaus Electric Flosser' },
  { file: 'Home_4_Sanctuary by Canopy.png',     label: 'Sanctuary by Canopy' },
  { file: 'Home_5_Pax Grinder.png',             label: 'Pax Grinder' },
  { file: 'Home_6_Bloom by Canopy.png',         label: 'Bloom by Canopy' },
  { file: 'Home_7_Arber Packaging.png',         label: 'Arber Packaging' },
  { file: 'Home_8_Pax Smoking Kit.png',         label: 'Pax Smoking Kit' },
  { file: 'Home_9_Canopy Water Filter.png',     label: 'Canopy Water Filter' },
];
const BASE         = 'images/Home images/';
const DEFAULT_ZONE = 4; // Pax Grinder

// Preload all images so zone transitions are instant
SECTIONS.forEach(s => { const img = new Image(); img.src = BASE + s.file; });

const clip         = document.getElementById('clip');
const layerA       = document.getElementById('layer-a');
const layerB       = document.getElementById('layer-b');
const cursorEl     = document.getElementById('cursor');

let activeLayer    = layerA;
let inactiveLayer  = layerB;
let currentZone    = DEFAULT_ZONE;

function setLayer(layer, idx) {
  layer.style.backgroundImage = `url("${BASE}${SECTIONS[idx].file}")`;
}

// Boot with default — show immediately, no opening blur-in
setLayer(layerA, DEFAULT_ZONE);
layerA.style.transition = 'none';
layerA.classList.add('visible');
requestAnimationFrame(() => requestAnimationFrame(() => {
  layerA.style.transition = '';
}));

cursorEl.textContent = SECTIONS[DEFAULT_ZONE].label;

function crossfadeTo(idx) {
  if (idx === currentZone) return;
  currentZone = idx;

  setLayer(inactiveLayer, idx);
  inactiveLayer.getBoundingClientRect(); // force reflow to register start state
  inactiveLayer.classList.add('visible');
  activeLayer.classList.remove('visible');

  const tmp     = activeLayer;
  activeLayer   = inactiveLayer;
  inactiveLayer = tmp;

  cursorEl.textContent = SECTIONS[idx].label;
}

function zoneAt(cx, cy) {
  const r   = clip.getBoundingClientRect();
  const col = Math.min(2, Math.floor(((cx - r.left) / r.width)  * 3));
  const row = Math.min(2, Math.floor(((cy - r.top)  / r.height) * 3));
  return row * 3 + col;
}

document.addEventListener('mousemove', (e) => {
  const r      = clip.getBoundingClientRect();
  const inClip = e.clientX >= r.left && e.clientX <= r.right &&
                  e.clientY >= r.top  && e.clientY <= r.bottom;

  if (inClip) {
    cursorEl.style.left    = e.clientX + 'px';
    cursorEl.style.top     = e.clientY + 'px';
    cursorEl.style.display = 'block';
    crossfadeTo(zoneAt(e.clientX, e.clientY));
  } else {
    cursorEl.style.display = 'none';
  }
});
</script>

</body>
</html>
