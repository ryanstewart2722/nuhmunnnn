<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman Nanda</title>
<style>
:root { --edge: 20px; }
@font-face {
  font-family: 'ABCDiatype';
  src: url('./fonts/ABCDiatype-Regular.otf') format('opentype');
  font-weight: normal; font-style: normal;
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  border: 0 none; outline: 0 none;
  -webkit-tap-highlight-color: transparent;
}
html {
  width: 100%; height: 100%;
  background: #D9D9D9;
  overflow: hidden;
}
body {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #D9D9D9;
  overflow: hidden;
  font-family: 'ABCDiatype', Arial, sans-serif;
  transition: background-color 0.8s ease;
}

/* ── Frame ── */
#bl { position: fixed; top: 0; left: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#br { position: fixed; top: 0; right: 0; bottom: 0; width: 15px; background: #D9D9D9; z-index: 950; pointer-events: none; }
#nav {
  position: fixed; top: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 15px; background: #D9D9D9; z-index: 200; cursor: auto;
}
#nav a, #nav span {
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px; color: #1a1a1a; text-decoration: none;
}
#nav a:hover { opacity: 0.5; }
#nav-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a;
}
#nav-center:hover { animation: hue-cycle 1.5s linear infinite; }
#footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: #D9D9D9; z-index: 200; cursor: auto;
  font-family: 'ABCDiatype', Arial, sans-serif; font-size: 12px; color: #1a1a1a;
}
@keyframes hue-cycle { 0% { color: hsl(0,42%,67%); } 44% { color: hsl(158,42%,67%); } 55% { color: hsl(222,42%,67%); } 100% { color: hsl(360,42%,67%); } }
body.party #clip { background:transparent !important; }
#party-toggle { background:none; border:none; padding:0; cursor:pointer; color:#1a1a1a; position:absolute; right:10px; top:50%; transform:translateY(-50%); line-height:0; }
#party-toggle:hover { animation:hue-cycle 1.5s linear infinite; }
body.party #party-toggle { animation:hue-cycle 1.5s linear infinite; }

/* ── Clip area ── */
#clip {
  position: absolute;
  top: 28px; bottom: 28px; left: 15px; right: 15px;
  overflow: hidden;
  cursor: none;
}

/* ── Image layers — two for keyframe crossfade ── */
/* ── Image layers — soft blur crossfade ── */
.img-layer {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  filter: blur(18px);
  transition: opacity 0.2s ease, filter 0.2s ease;
  will-change: opacity, filter;
}
.img-layer.visible {
  opacity: 1;
  filter: blur(0px);
}

/* ── Inner shadow (Figma: inset 0 0 10px 4px rgba(0,0,0,.15)) ── */
#inner-shadow {
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 10px 4px rgba(0,0,0,0.15);
  pointer-events: none;
  z-index: 3;
}

/* ── Custom cursor ── */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 190;
  font-family: 'ABCDiatype', Arial, sans-serif;
  font-size: 12px;
  line-height: 1;
  color: #ffffff;
  mix-blend-mode: exclusion;
  transform: translate(-50%, -50%);
  white-space: nowrap;
  display: none;
  user-select: none;
  -webkit-user-select: none;
}
</style>
</head>
<body>

<div id="bl"></div>
<div id="br"></div>

<nav id="nav">
  <a href="products.html">Work</a>
  <span id="nav-center">Naman Nanda</span>
  <a href="about.html">About</a>
</nav>

  <div class="img-layer" id="layer-a"></div>
  <div class="img-layer" id="layer-b"></div>

</div>

<script>
// 5×5 = 25 zones. Zone 12 (row 2, col 2) = center = Pax Grinder (image 13).
// Images used in order 1–25 as provided.
const SECTIONS = [
  { file: 'Home_1_Canopy Humidifier.png',       label: 'Canopy Humidifier' },       // 0
  { file: 'Home_2_Canopy.png',                  label: 'Canopy' },                  // 1
  { file: 'Home_3_Saintly Tushy.png',           label: 'Saintly Tushy' },           // 2
  { file: 'Home_4_Pax Smoking Kit.png',         label: 'Pax Smoking Kit' },         // 3
  { file: 'Home_5_Made In Utensil Set.png',     label: 'Made In Utensil Set' },     // 4
  { file: 'Home_6_Pax Grinder.png',             label: 'Pax Grinder' },             // 5
  { file: 'Home_7_Canopy Showerhead.png',       label: 'Canopy Showerhead' },       // 6
  { file: 'Home_8_Pax Smoking Kit.png',         label: 'Pax Smoking Kit' },         // 7
  { file: 'Home_9_Flaus Electric Flosser.png',  label: 'Flaus Electric Flosser' },  // 8
  { file: 'Home_10_Saintly Tushy.png',          label: 'Saintly Tushy' },           // 9
  { file: 'Home_11_Flaus Electric Flosser.png', label: 'Flaus Electric Flosser' },  // 10
  { file: 'Home_12_Canopy.png',                 label: 'Canopy' },                  // 11
  { file: 'Home_13_Pax Grinder.png',            label: 'Pax Grinder' },             // 12 — CENTER
  { file: 'Home_14_Canopy Humidifier.png',      label: 'Canopy Humidifier' },       // 13
  { file: 'Home_15_Pax Grinder.png',            label: 'Pax Grinder' },             // 14
  { file: 'Home_16_Saintly Tushy.png',          label: 'Saintly Tushy' },           // 15
  { file: 'Home_17_Arber Soil Food.png',        label: 'Arber Soil Food' },         // 16
  { file: 'Home_18_Pax Smoking Kit.png',        label: 'Pax Smoking Kit' },         // 17
  { file: 'Home_19_Canopy.png',                 label: 'Canopy' },                  // 18
  { file: 'Home_20_Canopy Water Faucet.png',    label: 'Canopy Water Faucet' },     // 19
  { file: 'Home_21_Flaus Electric Flosser.png', label: 'Flaus Electric Flosser' },  // 20
  { file: 'Home_22_Canopy Humidifier.png',      label: 'Canopy Humidifier' },       // 21
  { file: 'Home_23_Canopy Water Faucet.png',    label: 'Canopy Water Faucet' },     // 22
  { file: 'Home_24_Made In Utensil Set.png',    label: 'Made In Utensil Set' },     // 23
  { file: 'Home_25_Canopy.png',                 label: 'Canopy' },                  // 24
];
const BASE         = 'images/';
const DEFAULT_ZONE = 12; // Pax Grinder — center of 5×5

// Preload all images so zone transitions are instant
SECTIONS.forEach(s => { const img = new Image(); img.src = BASE + s.file; });

const clip         = document.getElementById('clip');
const layerA       = document.getElementById('layer-a');
const layerB       = document.getElementById('layer-b');
const cursorEl     = document.getElementById('cursor');

let activeLayer    = layerA;
let inactiveLayer  = layerB;
let currentZone    = DEFAULT_ZONE;

function setLayer(layer, idx) {
  layer.style.backgroundImage = `url("${BASE}${SECTIONS[idx].file}")`;
}

// Boot with default — show immediately, no opening blur-in
setLayer(layerA, DEFAULT_ZONE);
layerA.style.transition = 'none';
layerA.classList.add('visible');
requestAnimationFrame(() => requestAnimationFrame(() => {
  layerA.style.transition = '';
}));

cursorEl.textContent = SECTIONS[DEFAULT_ZONE].label;

function crossfadeTo(idx) {
  if (idx === currentZone) return;
  currentZone = idx;

  setLayer(inactiveLayer, idx);
  inactiveLayer.getBoundingClientRect(); // force reflow to register start state
  inactiveLayer.classList.add('visible');
  activeLayer.classList.remove('visible');

  const tmp     = activeLayer;
  activeLayer   = inactiveLayer;
  inactiveLayer = tmp;

  cursorEl.textContent = SECTIONS[idx].label;
}

function zoneAt(cx, cy) {
  const r   = clip.getBoundingClientRect();
  const col = Math.min(4, Math.floor(((cx - r.left) / r.width)  * 5));
  const row = Math.min(4, Math.floor(((cy - r.top)  / r.height) * 5));
  return row * 5 + col;
}

// Easter egg: triple-click → products page
let clickCount = 0, clickTimer = null;
clip.addEventListener('click', () => {
  clickCount++;
  clearTimeout(clickTimer);
  if (clickCount >= 3) { clickCount = 0; window.location.href = 'products.html'; return; }
  clickTimer = setTimeout(() => { clickCount = 0; }, 400);
});

document.addEventListener('mousemove', (e) => {
  const r      = clip.getBoundingClientRect();
  const inClip = e.clientX >= r.left && e.clientX <= r.right &&
                  e.clientY >= r.top  && e.clientY <= r.bottom;

  if (inClip) {
    cursorEl.style.left    = e.clientX + 'px';
    cursorEl.style.top     = e.clientY + 'px';
    cursorEl.style.display = 'block';
    crossfadeTo(zoneAt(e.clientX, e.clientY));
  } else {
    cursorEl.style.display = 'none';
  }
});

// ── Party mode (auto-dismisses after 3s on home) ──
(function() {
  const KEY = 'naman-party';
  const BANNED = [[160, 220]];
  let lastH = -1, _interval = null;
  function nextPastel() {
    let h;
    do { h = Math.floor(Math.random() * 360); }
    while (Math.abs(h - lastH) < 40 || BANNED.some(([a,b]) => h >= a && h <= b));
    lastH = h;
    return `hsl(${h},${35 + Math.floor(Math.random() * 20)}%,${62 + Math.floor(Math.random() * 10)}%)`;
  }
  function setParty(on) {
    document.body.classList.toggle('party', on);
    localStorage.setItem(KEY, on ? '1' : '0');
    if (on) {
      document.body.style.backgroundColor = nextPastel();
      _interval = setInterval(() => { document.body.style.backgroundColor = nextPastel(); }, 2000);
    } else {
      clearInterval(_interval); _interval = null;
      document.body.style.backgroundColor = '';
    }
  }
  if (localStorage.getItem(KEY) === '1') {
    setParty(true);
    setTimeout(() => setParty(false), 3000);
  }
  document.getElementById('party-toggle').addEventListener('click', () => {
    const on = !document.body.classList.contains('party');
    setParty(on);
    if (on) setTimeout(() => setParty(false), 3000);
  });
})();
</script>
